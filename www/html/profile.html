<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/profile.css">
    <link rel="stylesheet" href="../js/profile.js">
    <script src="../db/config.js" type="module"></script> <!-- fisierul pentru accesarea firebase -->
    <title>Profile</title>
</head>

<body>
    <div class="body">
        <div class="topContainer" style="height: 181px;">
            <p class="text2" style="left: 35%;">Profil</p>
            <img class="logout" src="../assets/profile/logout.png">
            <span class="circle">
                <img class="profileBlue" type="image" src="../assets/profile/profile-blue.png">
            </span>
        </div>
        <div class="mainDiv" style="top: 350px;">
            <div class="fullName">
                <img type="image" src="../assets/profile/name-logo.png">
                <input class="nameInput">
            </div>
            <div class="email">
                <img type="image" src="../assets/profile/mail-logo.png">
                <input class="nameInput">
            </div>
            <div class="birthday">
                <img type="image" style="margin-left: 25px;" src="../assets/profile/birthday-logo.png">
                <input class="bday" type="date" name="birthday">
            </div>
            <div class="editButton">
                <button type="submit" class="smallButton">Editează profilul</button>
            </div>
        </div>
    </div>
    <div class="bottomNav">
        <button onclick="location = '../html/home.html'" class="home"></button>
        <button onclick="location = '../html/search.html'" class="search"></button>
        <button onclick="location = '../html/profile.html'" class="profile active"></button>
    </div>
</body>

</html>
