<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/main.css">
    <!-- <script src='js/main.js' type='module' defer></script> -->
    <script src="../db/config.js" type="module"></script> <!-- fisierul pentru accesarea firebase -->
    <script src="../db/register-db.js" type="module"></script>
    <title>Sign Up</title>
</head>

<body>
    <div class="body">
        <div class="topContainer" style="height: 257px;">
            <img type="image" class="kiddyLogo" src="../assets/logo.png">
        </div>
        <form id="register-form" class="mainDiv" style="top: 257px; padding-bottom: 0;">
            <div class="AuthContainer">
                <p class="AuthLabel">Nume</p>
                <input name="lastName" type="lastName" class="baseInput" required>
            </div>
            <div class="AuthContainer">
                <p class="AuthLabel">Prenume</p>
                <input name="firstName" type="firstName" class="baseInput" required>
            </div>
            <div class="AuthContainer">
                <p class="AuthLabel">Email</p>
                <input name="email" type="email" class="baseInput" required>
            </div>
            <div class="AuthContainer">
                <p class="AuthLabel">Parola</p>
                <input name="password" type="password" class="baseInput" required>
            </div>
            <div class="AuthContainer">
                <p class="AuthLabel">Confirmă parola</p>
                <input name="confirm-password" type="password" class="baseInput" required>
            </div>
            <div class="AuthContainer">
                <p class="AuthLabel">Ziua de naștere</p>
                <input name="birthday" type="date" class="date">
            </div>
            <a href="../html/home.html">
                <button type="submit" class="smallButton">Înregistrează-te</button>
                <!-- aici ne va duce catre create account -->
            </a>
            <a class="conect" href="../index.html">
                <p class="text1">Ai un cont deja?<p class="text1" style="text-decoration: underline;">Conectează-te</p></p>
            </a>
        </form>
    </div>
</body>

</html>
